name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Home Assistant or EV charging workflow do you want to improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - BLE connection or proxy handling
        - Discovery or config flow
        - Charger controls
        - Sensors or entities
        - Diagnostics
        - Device compatibility
        - HACS installation or release process
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and reliability considerations
      description: Note any electrical safety, charger behavior, or failure-mode concerns.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other designs you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, examples, or links if useful. Remove private data first.
